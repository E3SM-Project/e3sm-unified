[workspace]
name = "e3sm-unified-ci"
channels = ["https://conda.anaconda.org/conda-forge/label/mache_dev", "conda-forge"]
platforms = ["linux-64"]
channel-priority = "strict"

[dependencies]
python = ">=3.10,<3.14"
mache = "==3.3.0rc1"
pytest = "*"
pyyaml = "*"
rattler-build = "*"
sphinx = ">=7.0.0"
sphinx_rtd_theme = "*"
"myst-parser" = "*"

[feature.py310.dependencies]
python = "3.10.*"

[feature.py311.dependencies]
python = "3.11.*"

[feature.py312.dependencies]
python = "3.12.*"

[feature.py313.dependencies]
python = "3.13.*"

[environments]
py310 = ["py310"]
py311 = ["py311"]
py312 = ["py312"]
py313 = ["py313"]
