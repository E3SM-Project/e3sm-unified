name: CI/CD Build Workflow

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

  workflow_dispatch:

env:
  CANCEL_OTHERS: false
  PATHS_IGNORE: '["**/README.md", "**/docs/**"]'

jobs:
  build:
    name: test E3SM-Unified - python ${{ matrix.python-version }} - mpi ${{ matrix.mpi }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      matrix:
        include:
          - python-version: "3.11"
            pixi-environment: py311
            mpi: hpc
          - python-version: "3.11"
            pixi-environment: py311
            mpi: nompi
          # - python-version: "3.11"
          #   pixi-environment: py311
          #   mpi: mpich
          # - python-version: "3.11"
          #   pixi-environment: py311
          #   mpi: openmpi
          - python-version: "3.12"
            pixi-environment: py312
            mpi: hpc
          - python-version: "3.12"
            pixi-environment: py312
            mpi: nompi
          # - python-version: "3.12"
          #   pixi-environment: py312
          #   mpi: mpich
          # - python-version: "3.12"
          #   pixi-environment: py312
          #   mpi: openmpi
          - python-version: "3.13"
            pixi-environment: py313
            mpi: hpc
          - python-version: "3.13"
            pixi-environment: py313
            mpi: nompi
      #     - python-version: "3.13"
      #       pixi-environment: py313
      #       mpi: mpich
      #     - python-version: "3.13"
      #       pixi-environment: py313
      #       mpi: openmpi
      # fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set Up Pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          environments: ${{ matrix.pixi-environment }}
          activate-environment: ${{ matrix.pixi-environment }}
          cache: false

      - name: Build E3SM-Unified
        run: |
          set -euo pipefail
          cd recipes/e3sm-unified
          ./build_packages.py \
              --python ${{ matrix.python-version }} \
              --mpi ${{ matrix.mpi }} \
              --output-dir ../../deploy_tmp/ci-local-channel

      - name: Run Pytest
        run: |
          set -euo pipefail
          pytest tests -q

      - name: Build Sphinx Docs
        run: |
          set -euo pipefail
          cd docs
          DOCS_VERSION=test make versioned-html
